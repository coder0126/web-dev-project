        <div class="country-container">
            <div class="country-header">
         <h2>
            
            <p>please choose your country of residence</p>
            <button>country</button>
        </h2>
    </div>
        <div class="contact-container">
            <div class="contact-header">
                <h1>
                <p>Hello!We'd love to hear from you. Send us a message and we'll respond as soon as possible.</p>
                </h1>
            </div>
            <form id="contactForm" class="contact-form" method="POST" novalidate>
                <div id="contactAlert" class="contact-alert" role="alert" aria-live="polite"></div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" name="firstName" placeholder="Arya" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" name="lastName" placeholder="Stark" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="arya@example.com" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000">
                </div>

                
                

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="What is this about?" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Tell us more about your inquiry..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </section>
